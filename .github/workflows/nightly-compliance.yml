name: nightly-compliance
on:
  schedule:
    - cron: '0 3 * * *'   # daily 03:00 UTC
  workflow_dispatch: {}

jobs:
  kube-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with: { cluster-name: securebank }
      - name: Run kube-bench
        run: |
          kubectl apply -f https://raw.githubusercontent.com/aquasecurity/kube-bench/main/job.yaml
          kubectl wait --for=condition=complete job/kube-bench --timeout=300s
          kubectl logs -l app=kube-bench --tail=-1 > reports/cis-k8s/$(date +%F).log
      - uses: actions/upload-artifact@v4
        with: { name: kube-bench, path: reports/cis-k8s/ }

  docker-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker run --rm -v $PWD/reports/cis-docker:/out \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            docker/docker-bench-security:latest > reports/cis-docker/$(date +%F).log
      - uses: actions/upload-artifact@v4
        with: { name: docker-bench, path: reports/cis-docker/ }
