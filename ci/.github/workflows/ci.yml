name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  test:
    name: Test (${{ matrix.svc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [shared, auth-service, account-service, transaction-service, fraud-detection-service, notification-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install shared lib
        run: pip install -e src/shared[dev]

      - name: Install service
        if: matrix.svc != 'shared'
        run: pip install -e src/${{ matrix.svc }}

      - name: Ruff lint
        run: ruff check src/${{ matrix.svc }}

      - name: Bandit security lint
        run: bandit -q -r src/${{ matrix.svc }} -lll -iii

      - name: Pytest
        run: |
          if [ -d "src/${{ matrix.svc }}/tests" ]; then
            pytest -q --maxfail=1 --cov src/${{ matrix.svc }} src/${{ matrix.svc }}/tests
          fi

  sca:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          for svc in shared auth-service account-service transaction-service fraud-detection-service notification-service api-gateway; do
            if [ -f "src/$svc/pyproject.toml" ]; then
              pip-audit --desc -r src/$svc/pyproject.toml || true
            fi
          done

  secrets:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonar:
    name: SonarQube SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v3

      - name: Skip SonarQube
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "SonarQube secrets not configured. Skipping SAST scan."

  build:
    name: Build and Trivy Scan (${{ matrix.svc }})
    needs: [test, sca, secrets, sonar]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc: [auth-service, account-service, transaction-service, fraud-detection-service, notification-service, api-gateway, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.svc }}.Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.svc }}:${{ github.sha }}
          provenance: true
          sbom: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.svc }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-${{ matrix.svc }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.svc }}.sarif

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.svc }}@${{ steps.build.outputs.digest }}

  opa-tests:
    name: OPA Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA tests
        run: opa test k8s/policies/opa -v

      - name: Run Conftest tests
        run: |
          curl -L -o conftest.tgz https://github.com/open-policy-agent/conftest/releases/latest/download/conftest_Linux_x86_64.tar.gz
          tar xzf conftest.tgz
          ./conftest test k8s/apps/

  zap:
    name: OWASP ZAP DAST
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Boot stack
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Wait for app
        run: sleep 30

      - name: ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:8443"
          cmd_options: "-a -r zap-report.html -J zap-report.json"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: "zap-*"