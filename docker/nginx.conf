# SecureBank frontend — hardened nginx config
# - Serves the SPA static assets
# - Reverse proxies /v1, /health, /metrics to the API Gateway
# - Strict security headers (CSP, HSTS, X-Frame-Options, etc.)
# - Disables server tokens and unnecessary methods

server_tokens off;

upstream api_gateway {
    server api-gateway:8443;
    keepalive 16;
}

server {
    listen 8080 default_server;
    server_name _;

    # ---- Hardening ----
    client_max_body_size 1m;
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    send_timeout 10s;
    keepalive_timeout 30s 30s;

    # Limit methods (V13.2 — deny TRACE/CONNECT/etc.)
    if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ---- Security headers (ASVS V14.4) ----
    add_header Strict-Transport-Security      "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options         "nosniff" always;
    add_header X-Frame-Options                "DENY" always;
    add_header Referrer-Policy                "no-referrer" always;
    add_header Permissions-Policy             "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy     "same-origin" always;
    add_header Cross-Origin-Embedder-Policy   "require-corp" always;
    add_header Cross-Origin-Resource-Policy   "same-origin" always;
    add_header Content-Security-Policy        "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header X-XSS-Protection               "0" always;

    root /usr/share/nginx/html;
    index index.html;

    # ---- SPA static assets ----
    location = / {
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=3600, immutable" always;
        try_files $uri =404;
    }
    location ~* \.(?:png|jpg|jpeg|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ---- API reverse proxy ----
    location /v1/ {
        proxy_pass         http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;     # NOT $proxy_add_x_forwarded_for — prevents spoofing
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 5s;
    }
    location = /health {
        proxy_pass         http://api_gateway/health;
        access_log         off;
    }
    location = /metrics {
        # Metrics endpoint only accessible from the cluster network
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass         http://api_gateway/metrics;
    }

    # ---- Block hidden + sensitive files ----
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ \.(?:env|git|sql|bak|swp|orig)$ { deny all; access_log off; }
}
