  build:
    name: Build and Trivy Scan (${{ matrix.svc }})
    needs: [test, sca, secrets, sonar]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        svc:
          - auth-service
          - account-service
          - transaction-service
          - fraud-detection-service
          - notification-service
          - api-gateway
          - frontend

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: "${{ env.REGISTRY }}"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: "."
          file: "docker/${{ matrix.svc }}.Dockerfile"
          push: true
          tags: "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.svc }}:${{ github.sha }}"
          provenance: true
          sbom: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.svc }}:${{ github.sha }}"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-${{ matrix.svc }}.sarif"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-${{ matrix.svc }}.sarif"