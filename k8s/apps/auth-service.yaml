---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: securebank-app
  labels: { app: auth-service, tier: app }
spec:
  replicas: 2
  selector: { matchLabels: { app: auth-service } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: auth-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service"
    spec:
      serviceAccountName: auth-service
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: auth-service
          image: securebank-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8001, name: http }]
          env:
            - name: SB_ENVIRONMENT
              value: prod
            - name: SB_VAULT_ADDR
              value: http://vault.securebank-sec:8200
            - name: SB_POSTGRES_DSN
              valueFrom: { secretKeyRef: { name: auth-db, key: dsn } }
            - name: SB_REDIS_URL
              valueFrom: { secretKeyRef: { name: auth-redis, key: url } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /health, port: 8001 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: 8001 }
            initialDelaySeconds: 5
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { medium: Memory, sizeLimit: 64Mi }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: { matchLabels: { app: auth-service } }
---
apiVersion: v1
kind: Service
metadata: { name: auth-service, namespace: securebank-app }
spec:
  selector: { app: auth-service }
  ports: [{ port: 8001, targetPort: 8001, name: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: auth-service, namespace: securebank-app }
spec:
  minAvailable: 1
  selector: { matchLabels: { app: auth-service } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: auth-service, namespace: securebank-app }
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
