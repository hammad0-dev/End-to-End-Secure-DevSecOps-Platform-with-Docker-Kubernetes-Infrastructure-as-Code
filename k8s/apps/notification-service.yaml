---
apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-service, namespace: securebank-app }
spec:
  replicas: 2
  selector: { matchLabels: { app: notification-service } }
  template:
    metadata:
      labels: { app: notification-service }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
    spec:
      serviceAccountName: notification-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: notification
          image: securebank-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8005 }]
          env:
            - name: SB_KAFKA_BOOTSTRAP
              value: kafka.securebank-data:9093
            - name: SB_KAFKA_HMAC_HEX
              valueFrom: { secretKeyRef: { name: kafka-hmac, key: hex } }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: [ALL] }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 250m, memory: 256Mi }
          livenessProbe:  { httpGet: { path: /health, port: 8005 } }
          readinessProbe: { httpGet: { path: /ready,  port: 8005 } }
          volumeMounts: [{ name: tmp, mountPath: /tmp }]
      volumes: [{ name: tmp, emptyDir: { medium: Memory, sizeLimit: 64Mi } }]
---
apiVersion: v1
kind: Service
metadata: { name: notification-service, namespace: securebank-app }
spec:
  selector: { app: notification-service }
  ports: [{ port: 8005, targetPort: 8005 }]
